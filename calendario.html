<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Descubra o Dia</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
    linear-gradient(135deg,#0a0a0a,#1a1a1a);
    font-family:'Segoe UI',sans-serif;
    color:white;
    overflow:hidden;
}

.card{
    width:350px;
    padding:35px 30px;
    border-radius:28px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
    text-align:center;
    box-shadow:
    0 15px 45px rgba(0,0,0,.5),
    0 0 25px rgba(255,215,0,.05);
    animation:entrada .7s ease;
}

h2{
    color:#ffd700;
    margin-bottom:20px;
    font-size:1.8rem;
}

.sub{
    color:#bdbdbd;
    margin-bottom:22px;
    font-size:.95rem;
}

input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#242424;
    color:white;
    font-size:1rem;
    outline:none;
    margin-bottom:25px;
    transition:.2s;
}

input:focus{
    box-shadow:0 0 0 2px #ffd700;
}

#resultado{
    min-height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.15rem;
    line-height:1.5;
    color:#f2f2f2;
    transition:.3s;
}

.dia{
    color:#ffd700;
    font-weight:700;
}

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<div class="card">

    <h2>📅 Dia da Semana</h2>

    <p class="sub">
        Escolha qualquer data para descobrir em qual dia ela caiu.
    </p>

    <input type="date" id="data">

    <p id="resultado">
        Escolha uma data acima ⬆️
    </p>

</div>

<script>

const input = document.getElementById("data");
const resultado = document.getElementById("resultado");

input.addEventListener("change", function(){

    let valor = input.value;

    if(valor){

        let data = new Date(valor + "T00:00:00");

        let dias = [
            "Domingo",
            "Segunda-feira",
            "Terça-feira",
            "Quarta-feira",
            "Quinta-feira",
            "Sexta-feira",
            "Sábado"
        ];

        let diaSemana = dias[data.getDay()];

        resultado.style.opacity = 0;

        setTimeout(() => {

            resultado.innerHTML =
            `Esse dia caiu em: <span class="dia">${diaSemana}</span>`;

            resultado.style.opacity = 1;

        },150);

    }

});

</script>

</body>
</html>
