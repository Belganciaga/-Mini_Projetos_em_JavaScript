<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Interativo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(135deg,#0a0a0a,#1c1c1c);
    font-family:'Segoe UI',sans-serif;
    color:white;
    padding:20px;
}

.card{
    width:420px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:30px;
    padding:35px;
    box-shadow:
    0 20px 50px rgba(0,0,0,.5),
    0 0 30px rgba(255,215,0,.05);
    animation:entrada .7s ease;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

h1{
    color:#ffd700;
    font-size:1.8rem;
}

.pontos{
    background:#242424;
    padding:10px 14px;
    border-radius:14px;
    font-weight:700;
}

#pergunta{
    font-size:1.2rem;
    line-height:1.6;
    margin-bottom:25px;
}

#opcoes{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.opcao{
    background:#202020;
    border:none;
    color:white;
    padding:16px;
    border-radius:16px;
    cursor:pointer;
    font-size:1rem;
    transition:.2s;
    text-align:left;
}

.opcao:hover{
    transform:translateX(5px);
    background:#2a2a2a;
}

.correta{
    background:#124d28 !important;
}

.errada{
    background:#5a1a1a !important;
}

#feedback{
    margin-top:22px;
    font-size:1rem;
    font-weight:700;
    min-height:28px;
}

#proxima,
#reiniciar{
    width:100%;
    margin-top:20px;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#ffd700;
    color:#111;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
    display:none;
}

#proxima:hover,
#reiniciar:hover{
    background:#ffe95c;
    transform:translateY(-2px);
}

.progresso{
    width:100%;
    height:10px;
    background:#242424;
    border-radius:999px;
    margin-bottom:25px;
    overflow:hidden;
}

.barra{
    height:100%;
    width:0%;
    background:#ffd700;
    transition:.3s;
}

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<div class="card">

    <div class="topo">

        <h1>🧠 Quiz</h1>

        <div class="pontos">
            ⭐ <span id="acertos">0</span>
        </div>

    </div>

    <div class="progresso">
        <div class="barra" id="barra"></div>
    </div>

    <p id="pergunta"></p>

    <div id="opcoes"></div>

    <p id="feedback"></p>

    <button id="proxima">
        Próxima pergunta
    </button>

    <button id="reiniciar">
        Jogar novamente
    </button>

</div>

<script>

const quiz = [

{
    pergunta: "Qual é a capital do Brasil?",
    opcoes: [
        "Rio de Janeiro",
        "Brasília",
        "São Paulo",
        "Salvador"
    ],
    correta: 1
},

{
    pergunta: "Quanto é 5 × 6?",
    opcoes: [
        "30",
        "20",
        "15",
        "25"
    ],
    correta: 0
},

{
    pergunta: "Quem escreveu Dom Casmurro?",
    opcoes: [
        "Machado de Assis",
        "Monteiro Lobato",
        "Carlos Drummond",
        "José de Alencar"
    ],
    correta: 0
},

{
    pergunta: "Qual planeta é conhecido como planeta vermelho?",
    opcoes: [
        "Terra",
        "Marte",
        "Júpiter",
        "Saturno"
    ],
    correta: 1
},

{
    pergunta: "Quantos lados tem um hexágono?",
    opcoes: [
        "5",
        "6",
        "7",
        "8"
    ],
    correta: 1
}

];

let indice = 0;
let pontos = 0;

const perguntaEl = document.getElementById("pergunta");
const opcoesEl = document.getElementById("opcoes");
const feedbackEl = document.getElementById("feedback");
const acertosEl = document.getElementById("acertos");
const btnProxima = document.getElementById("proxima");
const btnReiniciar = document.getElementById("reiniciar");
const barra = document.getElementById("barra");


function mostrarPergunta(){

    let q = quiz[indice];

    perguntaEl.innerText = q.pergunta;

    opcoesEl.innerHTML = "";

    feedbackEl.innerText = "";

    btnProxima.style.display = "none";

    barra.style.width =
    ((indice / quiz.length) * 100) + "%";

    q.opcoes.forEach((opcao, i) => {

        let btn = document.createElement("button");

        btn.classList.add("opcao");

        btn.innerText = opcao;

        btn.onclick = () => verificarResposta(i, btn);

        opcoesEl.appendChild(btn);

    });

}


function verificarResposta(i, botao){

    let q = quiz[indice];

    const botoes =
    document.querySelectorAll(".opcao");

    botoes.forEach(btn => {

        btn.disabled = true;

    });

    if(i === q.correta){

        feedbackEl.innerText =
        "✅ Resposta correta!";

        botao.classList.add("correta");

        pontos++;

        acertosEl.innerText = pontos;

    }else{

        feedbackEl.innerText =
        "❌ Resposta errada!";

        botao.classList.add("errada");

        botoes[q.correta]
        .classList.add("correta");

    }

    btnProxima.style.display = "block";

}


btnProxima.onclick = () => {

    indice++;

    if(indice < quiz.length){

        mostrarPergunta();

    }else{

        finalizarQuiz();

    }

};


function finalizarQuiz(){

    barra.style.width = "100%";

    perguntaEl.innerText =
    "🎉 Quiz finalizado!";

    opcoesEl.innerHTML = "";

    feedbackEl.innerHTML =
    `Você acertou <b>${pontos}</b> de <b>${quiz.length}</b> perguntas.`;

    btnProxima.style.display = "none";

    btnReiniciar.style.display = "block";

}


btnReiniciar.onclick = () => {

    indice = 0;

    pontos = 0;

    acertosEl.innerText = "0";

    btnReiniciar.style.display = "none";

    mostrarPergunta();

};


mostrarPergunta();

</script>

</body>
</html>
