<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mudador de Cor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:#111;
    transition:background .5s ease;
    overflow:hidden;
}

.card{
    width:350px;
    padding:35px 30px;
    border-radius:30px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.1);
    text-align:center;
    box-shadow:
    0 20px 50px rgba(0,0,0,.5);
    animation:entrada .7s ease;
}

h1{
    color:white;
    font-size:2rem;
    margin-bottom:15px;
}

p{
    color:#f2f2f2;
    line-height:1.6;
    margin-bottom:25px;
    font-size:1.05rem;
}

.corAtual{
    width:100%;
    height:80px;
    border-radius:20px;
    margin-bottom:25px;
    border:2px solid rgba(255,255,255,.15);
    background:#111;
    transition:.4s;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    background:#ffd700;
    color:#111;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
    background:#ffe95c;
}

button:active{
    transform:scale(.96);
}

.nomeCor{
    margin-top:18px;
    color:white;
    font-weight:700;
    font-size:1rem;
}

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<div class="card">

    <h1>🎨 Mudador de Cor</h1>

    <p>
        Clique no botão para mudar a cor do fundo.
    </p>

    <div class="corAtual" id="preview"></div>

    <button id="botao">
        Mudar Cor
    </button>

    <div class="nomeCor" id="nomeCor">
        Cor atual: Preto
    </div>

</div>

<script>

const cores = [

{
    nome:"Azul Claro",
    valor:"#8ecae6"
},

{
    nome:"Verde Neon",
    valor:"#90ee90"
},

{
    nome:"Rosa",
    valor:"#ff8fab"
},

{
    nome:"Amarelo",
    valor:"#ffd166"
},

{
    nome:"Roxo",
    valor:"#c77dff"
},

{
    nome:"Laranja",
    valor:"#f4a261"
}

];

const botao =
document.getElementById("botao");

const preview =
document.getElementById("preview");

const nomeCor =
document.getElementById("nomeCor");

let idx = -1;

botao.addEventListener("click", function(){

    idx = (idx + 1) % cores.length;

    document.body.style.background =
    cores[idx].valor;

    preview.style.background =
    cores[idx].valor;

    nomeCor.innerText =
    "Cor atual: " + cores[idx].nome;

});

</script>

</body>
</html>
