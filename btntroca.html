<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mensagens Motivacionais</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
    linear-gradient(135deg,#0f0f0f,#1c1c1c);
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

.card{
    width:340px;
    padding:35px 28px;
    border-radius:28px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
    0 10px 40px rgba(0,0,0,.5),
    0 0 30px rgba(255,215,0,.05);
    text-align:center;
    animation:entrada .7s ease;
}

.titulo{
    color:#ffd700;
    font-size:1.8rem;
    margin-bottom:18px;
    font-weight:700;
}

#mensagem{
    color:#f2f2f2;
    font-size:1.1rem;
    line-height:1.7;
    min-height:110px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.3s;
}

button{
    margin-top:25px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#ffd700;
    color:#111;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
    background:#ffe95c;
}

button:active{
    transform:scale(.96);
}

@keyframes entrada{
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="card">

    <h1 class="titulo">✨ Frases do Dia</h1>

    <p id="mensagem">
        Clique no botão para receber uma mensagem.
    </p>

    <button id="botao">
        Nova mensagem
    </button>

</div>

<script>

const mensagemEl = document.getElementById('mensagem');
const botao = document.getElementById('botao');

const mensagens = [

"Você não precisa correr, só continuar andando.",

"Pequenos passos ainda te levam pra frente.",

"O começo pode ser difícil, mas vale a pena.",

"Até os dias ruins acabam.",

"Você já venceu coisas que achou impossíveis.",

"Seu esforço de hoje vira resultado amanhã.",

"Descansar também faz parte da evolução.",

"Continue. Uma hora tudo faz sentido."

];

let idx = -1;

botao.addEventListener("click", function(){

    idx = (idx + 1) % mensagens.length;

    mensagemEl.style.opacity = 0;

    setTimeout(() => {

        mensagemEl.textContent = mensagens[idx];

        mensagemEl.style.opacity = 1;

    }, 150);

});

</script>

</body>
</html>
