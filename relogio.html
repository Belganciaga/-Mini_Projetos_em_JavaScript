<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relógio Digital</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(135deg,#0a0a0a,#1b1b1b);
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

.card{
    width:380px;
    padding:40px 30px;
    border-radius:30px;
    background:rgba(255,255,255,.06);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    text-align:center;
    box-shadow:
    0 20px 50px rgba(0,0,0,.5),
    0 0 30px rgba(255,215,0,.05);
    animation:entrada .7s ease;
}

h1{
    color:#ffd700;
    margin-bottom:20px;
    font-size:2rem;
}

.relogio{
    font-size:4rem;
    font-weight:700;
    color:white;
    letter-spacing:4px;
    margin-bottom:18px;
}

.data{
    color:#cfcfcf;
    font-size:1rem;
    margin-bottom:25px;
}

.status{
    display:inline-block;
    padding:12px 18px;
    border-radius:999px;
    background:#202020;
    color:#ffd700;
    font-weight:700;
    font-size:.95rem;
}

@keyframes entrada{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<div class="card">

    <h1>⏰ Relógio Digital</h1>

    <div class="relogio" id="relogio">
        00:00:00
    </div>

    <div class="data" id="data">
        Carregando data...
    </div>

    <div class="status" id="status">
        🌙 Boa noite
    </div>

</div>

<script>

const relogio =
document.getElementById("relogio");

const dataEl =
document.getElementById("data");

const statusEl =
document.getElementById("status");


function atualizarRelogio(){

    const agora = new Date();

    let horas = agora.getHours();
    let minutos = agora.getMinutes();
    let segundos = agora.getSeconds();

    
    horas = String(horas).padStart(2,"0");
    minutos = String(minutos).padStart(2,"0");
    segundos = String(segundos).padStart(2,"0");

    
    relogio.innerText =
    `${horas}:${minutos}:${segundos}`;


    const dias = [
        "Domingo",
        "Segunda-feira",
        "Terça-feira",
        "Quarta-feira",
        "Quinta-feira",
        "Sexta-feira",
        "Sábado"
    ];

    const meses = [
        "Janeiro",
        "Fevereiro",
        "Março",
        "Abril",
        "Maio",
        "Junho",
        "Julho",
        "Agosto",
        "Setembro",
        "Outubro",
        "Novembro",
        "Dezembro"
    ];


    dataEl.innerText =
    `${dias[agora.getDay()]}, ${agora.getDate()} de ${meses[agora.getMonth()]} de ${agora.getFullYear()}`;


    if(agora.getHours() >= 6 && agora.getHours() < 12){

        statusEl.innerText =
        "☀️ Bom dia";

    }

    else if(agora.getHours() >= 12 && agora.getHours() < 18){

        statusEl.innerText =
        "🌤️ Boa tarde";

    }

    else{

        statusEl.innerText =
        "🌙 Boa noite";

    }

}


setInterval(atualizarRelogio,1000);

atualizarRelogio();

</script>

</body>
</html>
